name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Re-create Android Platform Files
        run: |
          rm -rf android
          flutter create --project-name hundred_game --platforms=android .

      - name: Fix MinSDK and Upgrade Kotlin Version
        run: |
          # Set MinSDK to 21 for Google Ads
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdkVersion 19/minSdkVersion 21/g' android/app/build.gradle

          # Upgrade Kotlin version in settings.gradle (Flutter 3.19+ default)
          if [ -f "android/settings.gradle" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.20"/g' android/settings.gradle
          fi

          # Upgrade Kotlin version in build.gradle (Fallback for legacy syntax)
          if [ -f "android/build.gradle" ]; then
            sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.20'/g" android/build.gradle
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hundred_game_apk
          path: build/app/outputs/flutter-apk/app-release.apk
